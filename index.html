<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Login | Contact</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4e73df, #1cc88a);
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        footer {
            background: #222;
            color: white;
            padding: 10px;
            text-align: center;
            margin-top: 50px;
        }

        .form-section {
            display: none;   /* Hide all forms initially */
        }
    </style>
</head>

<body>

    <h3> Harsh Bhosale </h3>
    <hr>
    <hr>
    
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">MyWebsite</a>

        <div class="ms-auto">
            <button class="btn btn-outline-light me-2" onclick="showForm('register')">Register</button>
            <button class="btn btn-outline-light me-2" onclick="showForm('login')">Login</button>
            <button class="btn btn-outline-light" onclick="showForm('contact')">Contact</button>
        </div>
    </div>
</nav>

<div class="container my-5">

    <!-- Register -->
    <div id="register" class="form-section row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-3">Register Your Details</h3>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email ID</label>
                        <input type="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" required>
                    </div>

                    <button class="btn btn-primary w-100">Register</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Login -->
    <div id="login" class="form-section row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-3">Login</h3>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" required>
                    </div>

                    <button class="btn btn-success w-100">Login</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Contact -->
    <div id="contact" class="form-section row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-3">Contact Us</h3>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Your Name</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Your Email</label>
                        <input type="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="4" required></textarea>
                    </div>

                    <button class="btn btn-warning w-100">Send Message</button>
                </form>
            </div>
        </div>
    </div>

</div>

<footer>
    © 2026 MyWebsite | All Rights Reserved
</footer>

<script>
    function showForm(formId) {
        document.querySelectorAll('.form-section').forEach(function(section) {
            section.style.display = "none";
        });

        document.getElementById(formId).style.display = "block";
    }

    showForm('register');
</script>

</body>
</html>
